name: CI (Python)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: python

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - uses: extractions/setup-just@v3

      - run: uv sync --frozen

      - run: just fmt-check

      - run: just lint

      - run: just typecheck

  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: python

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - uses: extractions/setup-just@v3

      - run: uv sync --frozen

      - run: just test
