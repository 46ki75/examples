<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blocks App</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 860px; margin: 40px auto; padding: 20px; color: #333; background: #fff; }
    h1 { margin-bottom: 4px; }
    .intro { color: #666; font-size: 0.9em; margin-bottom: 24px; line-height: 1.5; }
    .intro strong { color: #444; }
    input, textarea, select { padding: 8px; margin: 4px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.95em; }
    input[type="text"], input[type="email"], input[type="password"] { min-width: 220px; }
    button { padding: 8px 16px; margin: 4px; cursor: pointer; border: 1px solid #ddd; border-radius: 4px; background: #f8f8f8; font-size: 0.95em; }
    button:hover { background: #eee; }
    ul { padding: 0; }
    li { list-style: none; }

    /* Theme applied via document.body.dataset.theme (see src/index.tsx),
       persisted per-user through the KVStore-backed settings API. */
    body[data-theme="dark"] { color: #ddd; background: #1a1a1a; }
    body[data-theme="dark"] .intro { color: #999; }
    body[data-theme="dark"] .intro strong { color: #bbb; }
    body[data-theme="dark"] input,
    body[data-theme="dark"] textarea,
    body[data-theme="dark"] select { background: #2a2a2a; color: #ddd; border-color: #444; }
    body[data-theme="dark"] button { background: #2a2a2a; color: #ddd; border-color: #444; }
    body[data-theme="dark"] button:hover { background: #3a3a3a; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>
</html>
